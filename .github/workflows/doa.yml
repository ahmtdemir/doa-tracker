name: DOA Takip Sistemi

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Tetikleme kaynağı"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: doa-takip
  cancel-in-progress: false

jobs:
  doa-kontrol:
    runs-on: ubuntu-latest

    steps:
      - name: Projeyi indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerekli paketleri yükle
        run: pip install -r requirements.txt

      - name: Alarm testlerini çalıştır
        run: python -m unittest -v test_alert_formatter.py

      - name: Çalışma zamanını kaydet
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_WORKFLOW_NAME: ${{ github.workflow }}
          TRIGGER_SOURCE: ${{ inputs.trigger_source }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          from pathlib import Path

          history_file = Path("workflow_runs.jsonl")
          now_utc = datetime.now(timezone.utc)
          now_tr = now_utc.astimezone(ZoneInfo("Europe/Istanbul"))
          previous_time = None

          if history_file.exists():
              lines = [
                  line.strip()
                  for line in history_file.read_text(encoding="utf-8").splitlines()
                  if line.strip()
              ]
              if lines:
                  try:
                      previous_record = json.loads(lines[-1])
                      previous_time = datetime.fromisoformat(previous_record["startedAtUtc"])
                  except (json.JSONDecodeError, KeyError, ValueError):
                      previous_time = None

          gap_minutes = None
          if previous_time is not None:
              gap_minutes = round((now_utc - previous_time).total_seconds() / 60, 2)

          event_name = os.environ.get("GITHUB_EVENT_NAME")
          trigger_source = os.environ.get("TRIGGER_SOURCE") or "manual"

          record = {
              "runNumber": os.environ.get("GITHUB_RUN_NUMBER"),
              "event": event_name,
              "triggerSource": trigger_source,
              "workflow": os.environ.get("GITHUB_WORKFLOW_NAME"),
              "startedAtUtc": now_utc.isoformat(),
              "startedAtTurkey": now_tr.isoformat(),
              "minutesSincePreviousRun": gap_minutes,
          }

          with history_file.open("a", encoding="utf-8") as file:
              file.write(json.dumps(record, ensure_ascii=False) + "\n")

          print("=======================================")
          print(f"Event             : {record['event']}")
          print(f"Tetikleme kaynağı : {record['triggerSource']}")
          print(f"Run Number        : {record['runNumber']}")
          print(f"UTC               : {record['startedAtUtc']}")
          print(f"Türkiye           : {record['startedAtTurkey']}")
          print("=======================================")
          PY

      - name: DOA kontrolünü çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Durum ve geçmiş dosyalarını kaydet
        run: |
          if [ -z "$(git status --porcelain -- status.json machine_history.jsonl workflow_runs.jsonl)" ]; then
            echo "Kaydedilecek değişiklik yok."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TEMP_DIR="$(mktemp -d)"
          export TEMP_DIR

          for file in status.json machine_history.jsonl workflow_runs.jsonl; do
            if [ -f "$file" ]; then
              cp "$file" "$TEMP_DIR/$file"
            fi
          done

          for attempt in 1 2 3; do
            echo "Kayıt denemesi: $attempt/3"
            git fetch origin main
            git reset --hard origin/main

            python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          temp_dir = Path(os.environ["TEMP_DIR"])
          local_status = temp_dir / "status.json"
          if local_status.exists():
              shutil.copyfile(local_status, Path("status.json"))

          for filename in ("machine_history.jsonl", "workflow_runs.jsonl"):
              remote_file = Path(filename)
              local_file = temp_dir / filename
              merged = []
              seen = set()

              for source in (remote_file, local_file):
                  if not source.exists():
                      continue
                  for raw_line in source.read_text(encoding="utf-8").splitlines():
                      line = raw_line.strip()
                      if line and line not in seen:
                          seen.add(line)
                          merged.append(line)

              if merged:
                  remote_file.write_text("\n".join(merged) + "\n", encoding="utf-8")
          PY

            git add status.json machine_history.jsonl workflow_runs.jsonl
            if git diff --cached --quiet; then
              echo "Uzak dal zaten aynı verileri içeriyor."
              exit 0
            fi

            git commit -m "Update DOA status, history and workflow timing"
            if git push origin HEAD:main; then
              echo "Dosyalar başarıyla kaydedildi."
              exit 0
            fi

            echo "Push sırasında yeni commit geldi; tekrar deneniyor..."
            sleep 2
          done

          echo "Dosyalar üç denemeden sonra kaydedilemedi."
          exit 1

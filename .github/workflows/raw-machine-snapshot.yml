name: Ham Makine Görüntüsü

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: raw-machine-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Projeyi indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri yükle
        run: pip install -r requirements.txt

      - name: Ham API görüntüsünü al
        run: python machine_snapshot.py

      - name: Görüntüyü kaydet
        run: |
          if [ -z "$(git status --porcelain -- raw_machine_snapshots.json)" ]; then
            echo "Yeni görüntü yok."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add raw_machine_snapshots.json
          git commit -m "Capture raw machine API snapshot"
          git pull --rebase origin main
          git push origin HEAD:main
